global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'etl_pipeline'
    static_configs:
      - targets: ['metrics-exporter:8000']
    metrics_path: /metrics
    scrape_interval: 15s